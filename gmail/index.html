<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header padding-y-10">
      <div class="container">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Gmail_icon_%282020%29.svg/200px-Gmail_icon_%282020%29.svg.png"
          alt="Logo gmail"
        />
        <span>Gmail</span>
      </div>
    </header>
    <!-- Fine Header -->

    <!-- Main -->
    <main>
      <div class="container">
        <!-- Ricerca -->
        <section class="main-section padding-y-10">
          <p class="accent">You have <span class="circle">3</span> unread</p>
        </section>
        <!-- Fine Ricerca -->

        <!-- Email -->
        <section class="main-section padding-y-10">
          <ul class="email-list">
            <li>
              <span>&starf;</span>
              <strong>Oggetto dell'email</strong>
              <span class="content">Contenuto dell'email ...</span>
            </li>
            <li class="opened">
              <span>&starf;</span>
              <strong>Oggetto dell'email</strong>
              <span class="content">Contenuto dell'email ...</span>
            </li>
            <li>
              <span>&starf;</span>
              <strong>Oggetto dell'email</strong>
              <span class="content">Contenuto dell'email ...</span>
            </li>
            <li>
              <span>&starf;</span>
              <strong>Oggetto dell'email</strong>
              <span class="content">Contenuto dell'email ...</span>
            </li>
          </ul>
        </section>
        <!-- Fine Email -->
      </div>
    </main>
    <!-- Fine Main -->

    <!-- Footer -->
    <footer class="padding-y-10">
      <p class="author">Gmail powered by Davide</p>
    </footer>
    <!-- Fine Footer -->
  </body>
</html>
